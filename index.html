<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Taskboard</title>
    <link rel="stylesheet" href="style.css">
</head>

    <body>

    <header>
        <div class="header-left">
            <img src="assets/notes.png">
            <h1>Taskboard</h1>
        </div>
        <div class="header-right">        
            <button id="addTaskBtn">Nova tarefa</button>
        </div>
    </header>

    <main class="board">
        <div class="column" data-status="todo">
            <h2>A fazer</h2>
            <div class="task-list"></div>
        </div>
        <div class="column" data-status="doing">
            <h2>Em Progresso</h2>
            <div class="task-list"></div>
        </div>
        <div class="column" data-status="done">
            <h2>Concluído</h2>
            <div class="task-list"></div>
        </div>
    </main>

    <div id="taskModal" class="modal-overlay">
        <div class="modal">
            <h3 id="modalHeading">Nova tarefa</h3>
            <input type="text" id="modalTitle" placeholder="Título da tarefa *" maxlength="80">
            <textarea id="modalDesc" placeholder="Descrição (opcional)" rows="3"></textarea>
            <div class="modal-actions">
                <button id="modalCancel" class="btn-secondary">Cancelar</button>
                <button id="modalSave" class="btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal">
            <h3>Excluir tarefa?</h3>
            <p class="confirm-text">Essa ação não pode ser desfeita.</p>
            <div class="modal-actions">
                <button id="confirmCancel" class="btn-secondary">Cancelar</button>
                <button id="confirmDelete" class="btn-danger">Excluir</button>
            </div>
        </div>
    </div>

    <button id="changeTheme">
        <svg width="38px" height="47px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none"><path fill="#000000" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.353 3C5.849 4.408 3 7.463 3 11.47A9.53 9.53 0 0 0 12.53 21c4.007 0 7.062-2.849 8.47-6.353C8.17 17.065 8.14 8.14 9.353 3z"/></svg>
    </button>

    <script src="assets/js/app.js"></script>
</body>


</html>
